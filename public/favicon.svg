<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#0A0A0F"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Lime border accent -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#C8F465" stroke-width="2" opacity="0.5"/>
  <!-- RJ initials, centered -->
  <text
    x="32"
    y="44"
    font-family="'Syne', 'DM Sans', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#C8F465"
    text-anchor="middle"
    letter-spacing="-1"
  >RJ</text>
</svg>
